# ──────────────────────────────────────────────────────────────────────────────
# Dependabot — Dependency Updates
#
# Weekly security-only checks. Major version bumps are ignored to prevent
# noisy PRs — those are handled manually.
# ──────────────────────────────────────────────────────────────────────────────

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
    # Only allow patch and minor updates — major bumps reviewed manually
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - ci
    # Only allow minor/patch — major action bumps reviewed manually
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

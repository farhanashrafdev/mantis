# ──────────────────────────────────────────────────────────────────────────────
# mantis — DevSecOps Pipeline
#
# Full security pipeline: lint, typecheck, test, audit, build, scan
# This is the reference implementation of Mantis in a real DevSecOps workflow.
# ──────────────────────────────────────────────────────────────────────────────

name: DevSecOps

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ── Stage 1: Code Quality Gate ─────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict typecheck
        run: npm run typecheck

      - name: ESLint (zero tolerance)
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ── Stage 2: Dependency Security Audit ─────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical + high)
        run: npm audit --audit-level=high

  # ── Stage 3: Build ─────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, audit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Stage 4: Docker Build ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            mantis:${{ github.sha }}
            mantis:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── AI Security Scan ─────────────────────────────────────────────────
  # Moved to mantis-sample-app repo — see https://github.com/farhanashrafdev/mantis-sample-app
  # That repo demonstrates how to integrate Mantis into any project's CI/CD pipeline.

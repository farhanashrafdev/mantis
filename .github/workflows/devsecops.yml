# ──────────────────────────────────────────────────────────────────────────────
# mantis — DevSecOps Pipeline
#
# Full security pipeline: lint, typecheck, test, audit, build, scan
# This is the reference implementation of Mantis in a real DevSecOps workflow.
# ──────────────────────────────────────────────────────────────────────────────

name: DevSecOps

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Nightly scan — LLMs drift, so scan even when code hasn't changed
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ── Stage 1: Code Quality Gate ─────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict typecheck
        run: npm run typecheck

      - name: ESLint (zero tolerance)
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ── Stage 2: Dependency Security Audit ─────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical + high)
        run: npm audit --audit-level=high

  # ── Stage 3: Build ─────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, audit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Stage 4: Docker Build ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            mantis:${{ github.sha }}
            mantis:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 5: AI Security Scan (Mantis dogfooding) ─────────────────────
  # This stage starts the sample vulnerable app and scans it with Mantis.
  # This is how you'd integrate Mantis into any project's pipeline.
  ai-security-scan:
    name: AI Security Scan (Mantis)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Mantis dependencies
        run: npm ci

      - name: Build Mantis
        run: npm run build

      - name: Start sample vulnerable app
        run: |
          cd ../mantis-sample-app 2>/dev/null || cd sample-app 2>/dev/null || true
          if [ -f package.json ]; then
            npm install
            node index.js &
            sleep 3
          fi

      - name: Run Mantis scan (SARIF output)
        run: |
          node dist/cli/cli.js scan \
            --target http://localhost:3001/api/chat \
            --format sarif \
            --output mantis-results.sarif \
            --timeout 30000
        continue-on-error: true

      - name: Run Mantis scan (JSON output)
        run: |
          node dist/cli/cli.js scan \
            --target http://localhost:3001/api/chat \
            --format json \
            --output mantis-results.json \
            --timeout 30000
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: mantis-results.sarif
          category: mantis-ai-redteam

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mantis-scan-results
          path: |
            mantis-results.sarif
            mantis-results.json

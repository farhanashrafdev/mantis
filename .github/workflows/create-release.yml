# ──────────────────────────────────────────────────────────────────────────────
# mantis — Create Release
#
# Manual workflow: bumps version in package.json, commits, tags, and pushes.
# The tag push then triggers the Release pipeline (release.yml) automatically.
#
# Usage: Actions → Create Release → Run workflow → pick patch / minor / major
# ──────────────────────────────────────────────────────────────────────────────

name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  bump-and-tag:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "### 🚀 Bumped to ${NEW_VERSION}" >> $GITHUB_STEP_SUMMARY

      - name: Commit and tag
        run: |
          git add package.json package-lock.json
          git commit -m "release: ${{ steps.bump.outputs.version }}"
          git tag "${{ steps.bump.outputs.version }}"

      - name: Push
        run: |
          git push origin master
          git push origin "${{ steps.bump.outputs.version }}"
          echo "### ✅ Tag pushed — Release pipeline will start automatically" >> $GITHUB_STEP_SUMMARY
